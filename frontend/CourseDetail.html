<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดหลักสูตร | PTS Learning</title>
<script src="/comp/theme-boot.js"></script>
<link rel="stylesheet" href="site.css?v=20260724al">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#974258','on-surface-variant':'#5c4f55',error:'#ba1a1a'}}}}</script>
<style>
  .pts-gcal-row {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    margin: 0 0 20px; padding: 14px 16px;
    border: 1px solid var(--pts-border, rgba(151,66,88,.14));
    border-radius: 16px;
    background: color-mix(in srgb, var(--pts-primary, #974258) 5%, transparent);
  }
  .pts-gcal-row__text { flex: 1 1 180px; min-width: 0; }
  .pts-gcal-row__title { font-size: 14px; font-weight: 700; color: var(--pts-text, #1c1520); margin: 0 0 2px; }
  .pts-gcal-row__hint { font-size: 12px; color: var(--pts-muted, #5c4f55); margin: 0; }
  .pts-modal {
    position: fixed; inset: 0; z-index: 100000;
    display: none; align-items: center; justify-content: center;
    padding: 20px; background: rgba(18,10,18,.45);
  }
  .pts-modal.is-open { display: flex; }
  .pts-modal__panel {
    width: min(420px, 100%);
    background: var(--pts-surface, #fff);
    color: var(--pts-text, #1c1520);
    border-radius: 18px;
    border: 1px solid var(--pts-border, rgba(151,66,88,.16));
    box-shadow: 0 20px 50px rgba(28,21,32,.2);
    padding: 22px 20px 18px;
  }
  .pts-modal__title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
  .pts-modal__body { font-size: 14px; color: var(--pts-muted, #5c4f55); margin: 0 0 18px; line-height: 1.5; }
  .pts-modal__actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body class="pts-body">
<div id="app-navbar">
  <nav style="position:fixed;top:0;left:0;right:0;z-index:99999;height:68px;background:var(--pts-nav-bg,#fff);border-bottom:1px solid var(--pts-border,rgba(151,66,88,.18));">
    <div style="max-width:1120px;margin:0 auto;height:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between;">
      <a href="Home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--pts-text,#1c1520);font-weight:700;">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuABTNhK77NiL0IuFIQlI6OT3Vifm8qP13KVh2E7ow7C1nBZBzvCmxbfbPcqp_ufJqTB-yyShP5xCpLknrMb_L-Giu18pK_I31kIyaQ_R7QyIYjEwf6o5aRyjEY_AdnfLq2rmWtA8WnFI9-AaODwblGI-IcbELscflTPE3ViIRI0pz8sPdppAL4lmeCdpzCdbWVJVt8CsBOnK5aNpm5LSEzvcUIMq56MlbLb0noVVSeb7AcP1xu4117jog" alt="PTS Learning" style="height:42px;width:auto;max-width:160px;object-fit:contain;display:block;">
        PTS Learning
      </a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="Login.html" style="padding:8px 14px;border:1px solid #974258;border-radius:999px;color:#974258;text-decoration:none;font-weight:700;font-size:14px;">เข้าสู่ระบบ</a>
        <a href="Register.html" style="padding:8px 14px;background:#974258;border-radius:999px;color:#fff;text-decoration:none;font-weight:700;font-size:14px;">สมัครสมาชิก</a>
      </div>
    </div>
  </nav>
</div>
<main class="pts-main pts-main--wide">
  <div id="content"><div class="pts-empty">กำลังโหลด...</div></div>
</main>

<div id="gcal-connect-modal" class="pts-modal" role="dialog" aria-modal="true" aria-labelledby="gcal-modal-title" hidden>
  <div class="pts-modal__panel">
    <h3 id="gcal-modal-title" class="pts-modal__title">เชื่อมต่อ Google Calendar ก่อน</h3>
    <p class="pts-modal__body">
      เพื่อเพิ่มตารางเรียนคอร์สนี้ลงปฏิทินและรับการแจ้งเตือน
      ให้เชื่อมต่อบัญชี Google Calendar ที่หน้าตั้งค่าก่อน
    </p>
    <div class="pts-modal__actions">
      <button type="button" class="pts-btn pts-btn-outline" id="gcal-modal-close">ปิด</button>
      <a class="pts-btn pts-btn-primary" href="Settings.html">ไปเชื่อมต่อปฏิทิน</a>
    </div>
  </div>
</div>

<div class="pts-footer-note">© PTS Learning</div>
<script>
const courseId = new URLSearchParams(location.search).get('courseId');
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function openGcalModal() {
  const modal = document.getElementById('gcal-connect-modal');
  if (!modal) return;
  modal.hidden = false;
  modal.classList.add('is-open');
}
function closeGcalModal() {
  const modal = document.getElementById('gcal-connect-modal');
  if (!modal) return;
  modal.classList.remove('is-open');
  modal.hidden = true;
}

async function mountCourseGcalControls(hostEl) {
  if (!hostEl || !courseId) return;
  let pref;
  try {
    const res = await fetch(`/api/google/course-notify?courseId=${encodeURIComponent(courseId)}`, {
      credentials: 'include',
      cache: 'no-store'
    });
    pref = await res.json();
    if (!res.ok || pref.success === false) throw new Error(pref.message || 'โหลดสถานะปฏิทินไม่สำเร็จ');
  } catch (err) {
    console.warn(err);
    return;
  }

  // Case 3: not enrolled → hide all calendar UI
  if (!pref.enrolled) {
    hostEl.innerHTML = '';
    hostEl.hidden = true;
    return;
  }

  hostEl.hidden = false;

  async function setCourseNotify(enabled, btn, options = {}) {
    const msg = document.getElementById('gcal-course-msg');
    if (btn) btn.disabled = true;
    if (msg) { msg.textContent = 'กำลังอัปเดต...'; msg.className = 'pts-msg'; }
    try {
      const res = await fetch('/api/google/course-notify', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ courseId: Number(courseId), enabled: !!enabled })
      });
      const data = await res.json();
      if (!res.ok || data.success === false) throw new Error(data.message || 'อัปเดตไม่สำเร็จ');
      const synced = Number(data.synced || 0);
      const needsConnect = enabled && data.connected === false;
      if (msg) {
        msg.textContent = data.message || (enabled
          ? (synced > 0 ? `เพิ่ม ${synced} รายการเข้าปฏิทินแล้ว` : 'บันทึกแล้ว แต่ยังไม่มีตารางให้ส่ง')
          : 'นำคอร์สนี้ออกจากปฏิทินแล้ว');
        msg.className = (enabled && !needsConnect && (data.pending || synced === 0))
          ? 'pts-msg pts-msg--err'
          : 'pts-msg pts-msg--ok';
      }
      await mountCourseGcalControls(hostEl);
      // keep last message visible after remount
      const msg2 = document.getElementById('gcal-course-msg');
      if (msg2 && data.message) {
        msg2.textContent = data.message;
        msg2.className = (enabled && !needsConnect && (data.pending || synced === 0))
          ? 'pts-msg pts-msg--err'
          : 'pts-msg pts-msg--ok';
      }
      if (needsConnect || options.openConnectModal) openGcalModal();
    } catch (e) {
      if (msg) {
        msg.textContent = e.message || 'อัปเดตไม่สำเร็จ';
        msg.className = 'pts-msg pts-msg--err';
      }
      if (btn) btn.disabled = false;
    }
  }

  // Case 2: enrolled but Google not connected → save opt-in, then prompt Settings
  if (!pref.connected) {
    const alreadyQueued = !!pref.enabled;
    hostEl.innerHTML = `
      <div class="pts-gcal-row">
        <div class="pts-gcal-row__text">
          <p class="pts-gcal-row__title">${alreadyQueued ? 'รอบันทึกคอร์สนี้แล้ว — เชื่อม Google ต่อ' : 'เพิ่มคอร์สนี้ลงปฏิทิน'}</p>
          <p class="pts-gcal-row__hint">${alreadyQueued
            ? 'กดปุ่มเพื่อไปเชื่อมต่อ Google Calendar ที่หน้าตั้งค่า หลังเชื่อมสำเร็จระบบจะส่งตารางเข้าปฏิทินให้อัตโนมัติ'
            : 'กดปุ่มเพื่อบันทึกคอร์สนี้ แล้วเชื่อมต่อ Google Calendar (ถ้ายังไม่เชื่อม)'}</p>
        </div>
        <button type="button" class="pts-btn pts-btn-outline" id="gcal-add-btn">${alreadyQueued ? 'ไปเชื่อมต่อปฏิทิน' : 'เพิ่มลงปฏิทิน'}</button>
      </div>
      <p id="gcal-course-msg" class="pts-msg" style="margin-top:-8px;margin-bottom:16px;"></p>`;
    document.getElementById('gcal-add-btn')?.addEventListener('click', (e) => {
      if (alreadyQueued) {
        openGcalModal();
        return;
      }
      setCourseNotify(true, e.currentTarget, { openConnectModal: true });
    });
    return;
  }

  const upcoming = Number(pref.upcoming_count || 0);
  const scheduleCount = Number(pref.schedule_count || 0);

  // Case 1a: already opted in
  if (pref.enabled) {
    hostEl.innerHTML = `
      <div class="pts-gcal-row">
        <div class="pts-gcal-row__text">
          <p class="pts-gcal-row__title">คอร์สนี้เปิดรับเข้าปฏิทินแล้ว</p>
          <p class="pts-gcal-row__hint">${upcoming > 0
            ? `มีตารางที่จะเรียน ${upcoming} รายการ — ตรวจใน Google Calendar / หน้า <a class="text-primary underline" href="Schedule.html">ตารางเรียน</a>`
            : (scheduleCount > 0
              ? 'มีตารางในระบบแต่หมดเวลาแล้ว — ให้แอดมินสร้างตารางรอบใหม่'
              : 'ยังไม่มีตารางเรียนของคอร์สนี้ — ให้แอดมินสร้างที่ Admin → ตารางเรียน')}</p>
        </div>
        <button type="button" class="pts-btn pts-btn-outline" id="gcal-resync-btn">ซิงค์อีกครั้ง</button>
        <button type="button" class="pts-btn pts-btn-ghost" id="gcal-remove-btn">นำออกจากปฏิทิน</button>
      </div>
      <p id="gcal-course-msg" class="pts-msg" style="margin-top:-8px;margin-bottom:16px;"></p>`;
    document.getElementById('gcal-resync-btn')?.addEventListener('click', (e) => {
      setCourseNotify(true, e.currentTarget);
    });
    document.getElementById('gcal-remove-btn')?.addEventListener('click', (e) => {
      setCourseNotify(false, e.currentTarget);
    });
    return;
  }

  // Case 1b: connected, not added yet → opt-in button only
  hostEl.innerHTML = `
    <div class="pts-gcal-row">
      <div class="pts-gcal-row__text">
        <p class="pts-gcal-row__title">เพิ่มคอร์สนี้ลงปฏิทิน</p>
        <p class="pts-gcal-row__hint">${upcoming > 0
          ? `มีตาราง ${upcoming} รายการพร้อมส่งเข้าปฏิทิน — กดปุ่มถ้าต้องการ (ไม่ต้องการก็ไม่ต้องกด)`
          : (scheduleCount > 0
            ? 'คอร์สนี้มีตารางแต่หมดเวลาแล้ว — กดปุ่มได้เพื่อเปิดรับรอบใหม่ในภายหลัง'
            : 'ถ้าต้องการรับแจ้งเตือน กดปุ่มได้ (ตอนนี้คอร์สยังไม่มีตาราง — แอดมินต้องสร้างก่อนถึงจะเห็นในปฏิทิน)')}</p>
      </div>
      <button type="button" class="pts-btn pts-btn-outline" id="gcal-add-btn">เพิ่มลงปฏิทิน</button>
    </div>
    <p id="gcal-course-msg" class="pts-msg" style="margin-top:-8px;margin-bottom:16px;"></p>`;
  document.getElementById('gcal-add-btn')?.addEventListener('click', (e) => {
    setCourseNotify(true, e.currentTarget);
  });
}

(async () => {
  if (!courseId) {
    document.getElementById('content').innerHTML = '<div class="pts-empty">ไม่พบรหัสหลักสูตร</div>';
    return;
  }
  const me = await fetch('/api/users/me', { credentials:'include' }).then(r=>r.json());
  const res = await fetch(`/api/courses/${courseId}`, { credentials:'include' });
  const data = await res.json();
  if (!res.ok || !data.success) {
    document.getElementById('content').innerHTML = `<div class="pts-empty pts-msg--err">${escapeHtml(data.message||'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  const c = data.data;
  const price = Number(c.price || 0);
  const enrolled = Number(c.is_enrolled) === 1;
  const loggedIn = !!me.loggedIn;
  document.getElementById('content').innerHTML = `
    <article class="pts-card overflow-hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2">
        <div class="relative min-h-[240px] lg:min-h-[420px]">
          <img class="absolute inset-0 w-full h-full object-cover" src="${c.cover_image_url || 'https://placehold.co/800x500/f8e8ec/974258?text=PTS+Course'}" alt="">
        </div>
        <div class="p-6 lg:p-8 flex flex-col">
          <span class="pts-chip mb-3 w-fit">${escapeHtml(c.delivery_mode || 'course')}</span>
          <p class="text-xs font-bold tracking-[0.14em] text-primary mb-2">PTS LEARNING</p>
          <h1 class="text-3xl font-bold text-primary mb-2 pts-display">${escapeHtml(c.course_name)}</h1>
          <p class="text-sm text-on-surface-variant mb-4">โดย ${escapeHtml(c.instructor_name || '-')} · ${Number(c.total_hours||0)} ชม. · ${escapeHtml(c.difficulty_level||'-')}</p>
          <p class="text-on-surface-variant mb-5 leading-relaxed">${escapeHtml(c.description || 'ยังไม่มีคำอธิบายหลักสูตร')}</p>
          <p class="text-2xl font-bold pts-display mb-5">${price ? price.toLocaleString('th-TH') + ' บาท' : 'ติดต่อสอบถามราคา'}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            ${!loggedIn ? `<a class="pts-btn pts-btn-primary" href="Login.html">เข้าสู่ระบบเพื่อสมัครเรียน</a>` : enrolled
              ? `<a class="pts-btn pts-btn-primary" href="Learn.html?courseId=${c.course_id}">เข้าเรียน</a>`
              : `<button id="enroll" class="pts-btn pts-btn-primary">สมัครเรียน</button>
                 <a class="pts-btn pts-btn-outline" href="Payments.html?courseId=${c.course_id}">ชำระเงิน</a>`}
            ${loggedIn ? `<button id="fav" class="pts-btn pts-btn-ghost">${Number(c.is_favorited)?'นำออกจากโปรด':'บันทึกโปรด'}</button>` : ''}
            <a class="pts-btn pts-btn-outline" href="Courses.html">กลับรายการหลักสูตร</a>
          </div>
          <div id="course-gcal-host" hidden></div>
          <h2 class="font-bold mb-3">บทเรียนในหลักสูตร</h2>
          <ul class="space-y-2">${(data.lessons||[]).length
            ? (data.lessons||[]).map((l,i)=>`<li class="text-sm border border-[var(--pts-border)] rounded-xl px-3 py-2.5 flex justify-between gap-3"><span>${i+1}. ${escapeHtml(l.title)}</span><span class="text-on-surface-variant shrink-0">${l.duration_minutes||0} นาที</span></li>`).join('')
            : '<li class="text-sm text-on-surface-variant">ยังไม่มีบทเรียน — รอแอดมินเพิ่มเนื้อหา</li>'}</ul>
        </div>
      </div>
    </article>`;

  document.getElementById('enroll')?.addEventListener('click', async () => {
    const r = await fetch(`/api/courses/${courseId}/enroll`, { method:'POST', credentials:'include' });
    const j = await r.json();
    if (!r.ok) { console.error(j.message || 'สมัครเรียนไม่สำเร็จ'); return; }
    location.href = `Learn.html?courseId=${courseId}`;
  });
  document.getElementById('fav')?.addEventListener('click', async () => {
    const r = await fetch(`/api/courses/${courseId}/favorite`, { method:'POST', credentials:'include' });
    const j = await r.json();
    if (!r.ok) console.error(j.message || 'บันทึกโปรดไม่สำเร็จ');
    location.reload();
  });

  document.getElementById('gcal-modal-close')?.addEventListener('click', closeGcalModal);
  document.getElementById('gcal-connect-modal')?.addEventListener('click', (e) => {
    if (e.target.id === 'gcal-connect-modal') closeGcalModal();
  });

  if (loggedIn && enrolled) {
    await mountCourseGcalControls(document.getElementById('course-gcal-host'));
  }
})();
</script>

  }
})();
</script>
