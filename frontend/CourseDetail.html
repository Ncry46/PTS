<style>
  .pts-notify {
    margin: 0 0 22px;
    padding: 16px;
    border: 1px solid var(--pts-border, rgba(151,66,88,.14));
    border-radius: 16px;
    background: color-mix(in srgb, var(--pts-primary, #974258) 5%, transparent);
  }
  .pts-notify__title { font-size: 14px; font-weight: 700; margin: 0 0 4px; color: var(--pts-text, #1c1520); }
  .pts-notify__hint { font-size: 12px; color: var(--pts-muted, #5c4f55); margin: 0 0 12px; line-height: 1.45; }
  .pts-notify__actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .pts-notify__actions .pts-btn { flex: 1 1 160px; justify-content: center; text-align: center; }
  .pts-btn-line {
    background: #06C755;
    color: #fff;
    border-color: #06C755;
  }
  .pts-btn-line:hover { filter: brightness(0.95); color: #fff; }
  .pts-btn-line.is-disabled,
  .pts-btn-line[aria-disabled="true"] {
    opacity: 0.55;
    pointer-events: none;
  }
</style>

    <div style="max-width:1120px;margin:0 auto;height:100%;padding:0 16px;display:flex;align-items:center;justify-content:space-between;">
      <a href="Home.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--pts-text,#1c1520);font-weight:700;">

        PTS Learning
      </a>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <a href="Login.html" style="padding:8px 14px;border:1px solid #974258;border-radius:999px;color:#974258;text-decoration:none;font-weight:700;font-size:14px;">เข้าสู่ระบบ</a>
        <a href="Register.html" style="padding:8px 14px;background:#974258;border-radius:999px;color:#fff;text-decoration:none;font-weight:700;font-size:14px;">สมัครสมาชิก</a>
      </div>
    </div>
  </nav>
</div>
<main class="pts-main pts-main--wide">
  <div id="content"><div class="pts-empty">กำลังโหลด...</div></div>
</main>

<div class="pts-footer-note">© PTS Learning</div>
<script>
const courseId = new URLSearchParams(location.search).get('courseId');
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const courseReturnPath = () => `/CourseDetail.html?courseId=${encodeURIComponent(courseId || '')}`;

async function startGoogleCalendarOAuth() {
  const res = await fetch(`/api/google/oauth/start?redirect=0&returnTo=${encodeURIComponent(courseReturnPath())}`, {
    credentials: 'include',
    headers: { Accept: 'application/json' }
  });
  const data = await res.json();
  if (!res.ok || !data.url) throw new Error(data.message || 'เริ่มเชื่อม Google ไม่สำเร็จ');
  location.href = data.url;
}

async function mountCourseNotifyControls(hostEl) {
  if (!hostEl || !courseId) return;

  let pref;
  let lineInfo = { configured: false, url: null, name: 'PTS Learning' };
  try {
    const [prefRes, lineRes] = await Promise.all([
      fetch(`/api/google/course-notify?courseId=${encodeURIComponent(courseId)}`, {
        credentials: 'include',
        cache: 'no-store'
      }),
      fetch('/api/line/oa', { credentials: 'include', cache: 'no-store' })
    ]);
    pref = await prefRes.json();
    if (!prefRes.ok || pref.success === false) throw new Error(pref.message || 'โหลดสถานะไม่สำเร็จ');
    if (lineRes.ok) {
      const lineJson = await lineRes.json();
      if (lineJson && lineJson.success !== false) lineInfo = lineJson;
    }
  } catch (err) {
    console.warn(err);
    return;
  }

  // Not enrolled → no notify UI
  if (!pref.enrolled) {
    hostEl.innerHTML = '';
    hostEl.hidden = true;
    return;
  }

  hostEl.hidden = false;
  const enabled = !!pref.enabled;
  const connected = !!pref.connected;
  const upcoming = Number(pref.upcoming_count || 0);
  const calLabel = enabled
    ? 'เปิดรับปฏิทินแล้ว'
    : 'รับแจ้งเตือนเข้าปฏิทิน';
  const calHint = enabled
    ? (upcoming > 0
      ? `ส่งตาราง ${upcoming} รายการเข้า Google Calendar แล้ว — กดอีกครั้งเพื่อปิด`
      : 'เปิดรับแล้ว — เมื่อแอดมินสร้างตารางรอบใหม่ ระบบจะส่งเข้าปฏิทินให้อัตโนมัติ')
    : 'สมัครคอร์สอย่างเดียวยังไม่เข้าปฏิทิน — กดปุ่มนี้ถ้าต้องการ (ถ้ายังไม่เชื่อม Google จะพาไปอนุญาตทันที)';

  const lineConfigured = !!(lineInfo.configured && lineInfo.url);
  const lineLabel = `เชื่อม LINE OA`;
  const lineHref = lineConfigured ? lineInfo.url : '#';

  hostEl.innerHTML = `
    <div class="pts-notify">
      <p class="pts-notify__title">รับการแจ้งเตือน</p>
      <p class="pts-notify__hint">${escapeHtml(calHint)}</p>
      <div class="pts-notify__actions">
        <button type="button" class="pts-btn ${enabled ? 'pts-btn-primary' : 'pts-btn-outline'}" id="notify-cal-btn">${escapeHtml(calLabel)}</button>
        <a class="pts-btn pts-btn-line${!lineConfigured ? ' is-disabled' : ''}" id="notify-line-btn"
           href="${escapeHtml(lineHref)}"
           target="_blank" rel="noopener noreferrer"
           ${!lineConfigured ? 'aria-disabled="true"' : ''}>${escapeHtml(lineLabel)}</a>
      </div>
      ${enabled ? `<div class="pts-notify__actions" style="margin-top:8px;">
        <button type="button" class="pts-btn pts-btn-ghost" id="notify-cal-off-btn">ปิดการแจ้งเตือนปฏิทิน</button>
      </div>` : ''}
      <p id="notify-msg" class="pts-msg" style="margin:10px 0 0;"></p>
    </div>`;

  const msgEl = () => document.getElementById('notify-msg');

  async function setCourseNotify(on, btn) {
    const msg = msgEl();
    if (btn) btn.disabled = true;
    if (msg) { msg.textContent = 'กำลังอัปเดต...'; msg.className = 'pts-msg'; }
    try {
      const res = await fetch('/api/google/course-notify', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ courseId: Number(courseId), enabled: !!on })
      });
      const data = await res.json();
      if (!res.ok || data.success === false) throw new Error(data.message || 'อัปเดตไม่สำเร็จ');

      // Need Google connect → start OAuth from this page (no Settings hop)
      if (on && data.connected === false) {
        if (msg) {
          msg.textContent = 'บันทึกแล้ว — กำลังพาไปอนุญาต Google Calendar...';
          msg.className = 'pts-msg pts-msg--ok';
        }
        await startGoogleCalendarOAuth();
        return;
      }

      const synced = Number(data.synced || 0);
      await mountCourseNotifyControls(hostEl);
      const msg2 = msgEl();
      if (msg2) {
        msg2.textContent = data.message || (on
          ? (synced > 0 ? `เพิ่ม ${synced} รายการเข้าปฏิทินแล้ว` : 'เปิดรับแล้ว')
          : 'ปิดการแจ้งเตือนปฏิทินแล้ว');
        msg2.className = (on && (data.pending || synced === 0))
          ? 'pts-msg pts-msg--err'
          : 'pts-msg pts-msg--ok';
      }
    } catch (e) {
      if (msg) {
        msg.textContent = e.message || 'อัปเดตไม่สำเร็จ';
        msg.className = 'pts-msg pts-msg--err';
      }
      if (btn) btn.disabled = false;
    }
  }

  document.getElementById('notify-cal-btn')?.addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    if (enabled) {
      // Already on — offer soft feedback; use off button to disable
      const msg = msgEl();
      if (msg) {
        msg.textContent = connected
          ? 'เปิดรับอยู่แล้ว — ตรวจใน Google Calendar หรือกด “ปิดการแจ้งเตือนปฏิทิน” ถ้าไม่ต้องการ'
          : 'รอบันทึกแล้ว — กดปุ่มอีกครั้งถ้าต้องการเชื่อม Google';
        msg.className = 'pts-msg pts-msg--ok';
      }
      if (!connected) {
        try {
          btn.disabled = true;
          await startGoogleCalendarOAuth();
        } catch (err) {
          if (msg) {
            msg.textContent = err.message || 'เชื่อม Google ไม่สำเร็จ';
            msg.className = 'pts-msg pts-msg--err';
          }
          btn.disabled = false;
        }
      }
      return;
    }
    setCourseNotify(true, btn);
  });

  document.getElementById('notify-cal-off-btn')?.addEventListener('click', (e) => {
    setCourseNotify(false, e.currentTarget);
  });

  document.getElementById('notify-line-btn')?.addEventListener('click', (e) => {
    if (!lineConfigured) {
      e.preventDefault();
      const msg = msgEl();
      if (msg) {
        msg.textContent = 'ยังไม่ได้ตั้งค่าลิงก์ LINE OA บนเซิร์ฟเวอร์ (LINE_OA_ADD_FRIEND_URL)';
        msg.className = 'pts-msg pts-msg--err';
      }
    }
  });

  // Return from Google OAuth on this page
  const params = new URLSearchParams(location.search);
  const gcal = params.get('gcal');
  if (gcal === 'connected' || gcal === 'error') {
    const oauthMsg = params.get('msg');
    params.delete('gcal');
    params.delete('msg');
    const qs = params.toString();
    history.replaceState({}, '', `${location.pathname}${qs ? `?${qs}` : ''}`);

    const msg = msgEl();
    if (gcal === 'connected') {
      if (enabled) {
        // Already opted in before OAuth — resync now that Google is linked
        await setCourseNotify(true, null);
      } else if (msg) {
        msg.textContent = 'เชื่อม Google Calendar สำเร็จ — กด “รับแจ้งเตือนเข้าปฏิทิน” เพื่อส่งตารางคอร์สนี้';
        msg.className = 'pts-msg pts-msg--ok';
      }
    } else if (msg) {
      msg.textContent = oauthMsg || 'เชื่อม Google ไม่สำเร็จ';
      msg.className = 'pts-msg pts-msg--err';
    }
  }
}

(async () => {
  if (!courseId) {
    document.getElementById('content').innerHTML = '<div class="pts-empty">ไม่พบรหัสหลักสูตร</div>';
    return;
  }
  const me = await fetch('/api/users/me', { credentials:'include' }).then(r=>r.json());
  const res = await fetch(`/api/courses/${courseId}`, { credentials:'include' });
  const data = await res.json();
  if (!res.ok || !data.success) {
    document.getElementById('content').innerHTML = `<div class="pts-empty pts-msg--err">${escapeHtml(data.message||'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  const c = data.data;
  const price = Number(c.price || 0);
  const enrolled = Number(c.is_enrolled) === 1;
  const loggedIn = !!me.loggedIn;
  document.getElementById('content').innerHTML = `
    <article class="pts-card overflow-hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2">
        <div class="relative min-h-[240px] lg:min-h-[420px]">
          <img class="absolute inset-0 w-full h-full object-cover" src="${c.cover_image_url || 'https://placehold.co/800x500/f8e8ec/974258?text=PTS+Course'}" alt="">
        </div>
        <div class="p-6 lg:p-8 flex flex-col">
          <span class="pts-chip mb-3 w-fit">${escapeHtml(c.delivery_mode || 'course')}</span>
          <p class="text-xs font-bold tracking-[0.14em] text-primary mb-2">PTS LEARNING</p>
          <h1 class="text-3xl font-bold text-primary mb-2 pts-display">${escapeHtml(c.course_name)}</h1>
          <p class="text-sm text-on-surface-variant mb-4">โดย ${escapeHtml(c.instructor_name || '-')} · ${Number(c.total_hours||0)} ชม. · ${escapeHtml(c.difficulty_level||'-')}</p>
          <p class="text-on-surface-variant mb-5 leading-relaxed">${escapeHtml(c.description || 'ยังไม่มีคำอธิบายหลักสูตร')}</p>
          <p class="text-2xl font-bold pts-display mb-5">${price ? price.toLocaleString('th-TH') + ' บาท' : 'ติดต่อสอบถามราคา'}</p>
          <div class="flex flex-wrap gap-2 mb-4">
            ${!loggedIn ? `<a class="pts-btn pts-btn-primary" href="Login.html">เข้าสู่ระบบเพื่อสมัครเรียน</a>` : enrolled
              ? `<a class="pts-btn pts-btn-primary" href="Learn.html?courseId=${c.course_id}">เข้าเรียน</a>`
              : `<button id="enroll" class="pts-btn pts-btn-primary">สมัครเรียน</button>
                 <a class="pts-btn pts-btn-outline" href="Payments.html?courseId=${c.course_id}">ชำระเงิน</a>`}
            ${loggedIn ? `<button id="fav" class="pts-btn pts-btn-ghost">${Number(c.is_favorited)?'นำออกจากโปรด':'บันทึกโปรด'}</button>` : ''}
            <a class="pts-btn pts-btn-outline" href="Courses.html">กลับรายการหลักสูตร</a>
          </div>
          <div id="course-notify-host" hidden></div>
          <h2 class="font-bold mb-3">บทเรียนในหลักสูตร</h2>
          <ul class="space-y-2">${(data.lessons||[]).length
            ? (data.lessons||[]).map((l,i)=>`<li class="text-sm border border-[var(--pts-border)] rounded-xl px-3 py-2.5 flex justify-between gap-3"><span>${i+1}. ${escapeHtml(l.title)}</span><span class="text-on-surface-variant shrink-0">${l.duration_minutes||0} นาที</span></li>`).join('')
            : '<li class="text-sm text-on-surface-variant">ยังไม่มีบทเรียน — รอแอดมินเพิ่มเนื้อหา</li>'}</ul>
        </div>
      </div>
    </article>`;

  document.getElementById('enroll')?.addEventListener('click', async () => {
    const r = await fetch(`/api/courses/${courseId}/enroll`, { method:'POST', credentials:'include' });
    const j = await r.json();
    if (!r.ok) { console.error(j.message || 'สมัครเรียนไม่สำเร็จ'); return; }
    location.href = `Learn.html?courseId=${courseId}`;
  });
  document.getElementById('fav')?.addEventListener('click', async () => {
    const r = await fetch(`/api/courses/${courseId}/favorite`, { method:'POST', credentials:'include' });
    const j = await r.json();
    if (!r.ok) console.error(j.message || 'บันทึกโปรดไม่สำเร็จ');
    location.reload();
  });

  if (loggedIn && enrolled) {
    await mountCourseNotifyControls(document.getElementById('course-notify-host'));
  }
})();
</script>
