<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ชำระเงิน | PTS Learning</title>
<link rel="stylesheet" href="/comp/site.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{primary:'#974258','on-surface-variant':'#5c4f55'}}}}</script>
</head>
<body class="pts-body">
<div id="app-navbar"></div>
<main class="pts-main">
  <section class="pts-page-hero">
    <span class="pts-chip mb-3">Payments</span>
    <h1 class="text-3xl md:text-4xl font-bold text-primary mb-2 pts-display">ชำระเงินคอร์ส</h1>
    <p class="text-on-surface-variant max-w-xl">สร้างรายการ PromptPay แล้วกดยืนยันหลังโอน — บันทึกตามบัญชีของคุณ</p>
  </section>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
    <section class="pts-panel">
      <h2 class="font-bold text-lg mb-4">สร้างรายการ</h2>
      <label class="pts-field"><span>เลือกคอร์ส</span><select id="course-select" class="pts-input"></select></label>
      <label class="pts-field"><span>จำนวนเงิน (บาท)</span><input id="amount" type="number" value="0" min="0" class="pts-input"></label>
      <button id="create-pay" class="pts-btn pts-btn-primary w-full">สร้างรายการชำระเงิน</button>
      <p id="pay-msg" class="pts-msg"></p>
    </section>
    <section class="pts-panel">
      <h2 class="font-bold text-lg mb-4">ประวัติการชำระเงิน</h2>
      <div id="payment-list" class="space-y-3">กำลังโหลด...</div>
    </section>
  </div>
</main>
<div class="pts-footer-note">© PTS Learning</div>
<script>
const escapeHtml = (t) => String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const params = new URLSearchParams(location.search);
const presetCourseId = params.get('courseId');

async function init() {
  const me = await fetch('/api/users/me', { credentials: 'include' }).then(r => r.json());
  if (!me.loggedIn) return location.href = 'Login.html';

  const courses = await fetch('/api/courses', { credentials: 'include' }).then(r => r.json());
  const select = document.getElementById('course-select');
  const courseList = courses.data || [];
  select.innerHTML = courseList.length
    ? courseList.map(c => `<option value="${c.course_id}" data-price="${Number(c.price||0)}" ${String(c.course_id)===String(presetCourseId)?'selected':''}>${escapeHtml(c.course_name)}</option>`).join('')
    : '<option value="">ยังไม่มีคอร์ส</option>';
  const syncPrice = () => {
    const opt = select.selectedOptions[0];
    if (opt) document.getElementById('amount').value = opt.dataset.price || 0;
  };
  select.onchange = syncPrice;
  syncPrice();
  await loadPayments();

  document.getElementById('create-pay').onclick = async () => {
    const courseId = select.value;
    const amount = Number(document.getElementById('amount').value || 0);
    const msg = document.getElementById('pay-msg');
    const res = await fetch(`/api/courses/${courseId}/pay`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount })
    });
    const data = await res.json();
    msg.textContent = data.message || '';
    msg.className = res.ok ? 'pts-msg pts-msg--ok' : 'pts-msg pts-msg--err';
    await loadPayments();
  };
}

async function loadPayments() {
  const res = await fetch('/api/my/payments', { credentials: 'include' });
  const data = await res.json();
  const el = document.getElementById('payment-list');
  if (!res.ok || !data.success) {
    el.innerHTML = `<div class="pts-msg--err">${escapeHtml(data.message || 'โหลดไม่สำเร็จ')}</div>`;
    return;
  }
  if (!data.data.length) {
    el.innerHTML = `<div class="pts-empty" style="padding:28px"><p>ยังไม่มีรายการชำระเงิน</p></div>`;
    return;
  }
  el.innerHTML = data.data.map(p => `
    <div class="pts-row" style="padding:14px">
      <div>
        <p class="font-bold">${escapeHtml(p.course_name)}</p>
        <p class="text-sm text-on-surface-variant">${Number(p.amount).toLocaleString('th-TH')} ${escapeHtml(p.currency)} · ${escapeHtml(p.status)}</p>
        <p class="text-xs text-on-surface-variant mt-1">${escapeHtml(p.reference_code || '')}</p>
      </div>
      ${p.status === 'pending'
        ? `<button data-id="${p.payment_id}" class="confirm-pay pts-btn pts-btn-primary">ยืนยันชำระ</button>`
        : `<span class="pts-chip">ชำระแล้ว</span>`}
    </div>
  `).join('');

  el.querySelectorAll('.confirm-pay').forEach(btn => {
    btn.onclick = async () => {
      btn.disabled = true;
      const r = await fetch(`/api/payments/${btn.dataset.id}/confirm`, { method: 'POST', credentials: 'include' });
      const j = await r.json();
      alert(j.message || (r.ok ? 'สำเร็จ' : 'ไม่สำเร็จ'));
      await loadPayments();
    };
  });
}

init().catch(err => alert(err.message));
</script>
<script src="/comp/navbar.js"></script>
</body>
</html>
